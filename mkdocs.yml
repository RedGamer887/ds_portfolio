site_name: Moje portfolio
site_author: Denis Karankevich

repo_name: RedGamer887/portfolio_ai
repo_url: https://github.com/RedGamer887/portfolio_ai

theme:
  name: material
  language: pl
  icon:
    logo: material/account-circle
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-night
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/weather-sunny
  features:
    - palette

nav:
  - include: pl/nav.yml

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - i18n:
      default_language: pl
      languages:
        - code: pl
          name: Polski
          locale: pl_PL
        - code: en
          name: English
          locale: en_US